<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>s3sf</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f4f6f8;
  display: flex;
  flex-direction: column;
  align-items: center;
}

textarea {
  width: 320px;
  height: 120px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
  resize: none;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #2ecc71;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #27ae60;
}

.classroom {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.row {
  display: flex;
  gap: 14px;
  justify-content: center;
}

.block {
  display: grid;
  gap: 6px;
}

.block-2 { grid-template-columns: repeat(2, 50px); }
.block-3 { grid-template-columns: repeat(3, 50px); }
.block-4 { grid-template-columns: repeat(4, 50px); }

.seat {
  width: 50px;
  height: 50px;
  background: #dfe6e9;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  text-align: center;
  padding: 3px;
}

.seat small {
  font-size: 8px;
  opacity: 0.6;
}

.filled {
  background: #e74c3c;
  color: white;
}
</style>
</head>

<body>

<h1>macee attackkk!</h1>

<p>Names (one per line):</p>
<textarea id="names"></textarea>
<br>
<button onclick="assignSeats()">fate</button>

<div class="classroom" id="classroom"></div>

<script>
const classroomDiv = document.getElementById("classroom");
let seatElements = [];
let seatMap = [];
let seatCounter = 1;

const layouts = [
  [2,3,3,2],
  [2,3,3,2],
  [2,3,3,2],
  [2,3,3,2],
  [2,4,2]
];

// Build classroom with seat tracking
layouts.forEach((rowLayout, rowIndex) => {
  const row = document.createElement("div");
  row.className = "row";

  rowLayout.forEach(size => {
    const block = document.createElement("div");
    block.className = "block block-" + size;

    for (let i = 0; i < size; i++) {
      const seat = document.createElement("div");
      seat.className = "seat";
      seat.dataset.number = seatCounter;
      seat.innerHTML = "<small>" + seatCounter + "</small>";
      seatCounter++;

      block.appendChild(seat);
      seatElements.push(seat);
      seatMap.push({ row: rowIndex, block: block });
    }

    row.appendChild(block);
  });

  classroomDiv.appendChild(row);
});

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function assignSeats() {
  const input = document.getElementById("names").value.trim();
  if (!input) {
    alert("Enter student names first.");
    return;
  }

  let names = input.split("\n").map(n => n.trim()).filter(n => n);

  if (names.length > seatElements.length) {
    alert("Too many students!");
    return;
  }

  // Reset seats
  seatElements.forEach(seat => {
    seat.innerHTML = "<small>" + seat.dataset.number + "</small>";
    seat.classList.remove("filled");
  });

  let pool = [...names];

  let s41 = null;
  let s20 = null;
  let s23 = null;

  if (pool.length >= 41) {
    s41 = pool[40];
    pool.splice(40, 1);
  }

  if (pool.length >= 20) {
    s20 = pool[19];
    pool.splice(19, 1);
  }

  if (pool.length >= 23) {
    s23 = pool[22];
    pool.splice(22, 1);
  }

  let availableSeats = [...seatElements];
  shuffle(availableSeats);

  let pairSpot1 = null;
  let pairSpot2 = null;

  // Place pair
  if (s41 && s20) {
    for (let seat of availableSeats) {
      const parent = seat.parentElement;
      const siblings = Array.from(parent.children);
      const idx = siblings.indexOf(seat);

      if (idx < siblings.length - 1 && availableSeats.includes(siblings[idx+1])) {
        pairSpot1 = seat;
        pairSpot2 = siblings[idx+1];
        break;
      }
    }

    if (pairSpot1 && pairSpot2) {
      pairSpot1.innerHTML = "<small>" + pairSpot1.dataset.number + "</small><br>" + s41;
      pairSpot2.innerHTML = "<small>" + pairSpot2.dataset.number + "</small><br>" + s20;

      pairSpot1.classList.add("filled");
      pairSpot2.classList.add("filled");

      availableSeats = availableSeats.filter(
        s => s !== pairSpot1 && s !== pairSpot2
      );
    }
  }

  // Place #23 behind pairSpot1
  if (s23 && pairSpot1) {
    const pairIndex = seatElements.indexOf(pairSpot1);
    const pairRow = seatMap[pairIndex].row;
    const pairBlock = seatMap[pairIndex].block;
    const columnIndex = Array.from(pairBlock.children).indexOf(pairSpot1);

    let behindSeat = null;

    seatElements.forEach((seat, i) => {
      if (
        seatMap[i].row === pairRow + 1 &&
        seatMap[i].block === pairBlock &&
        Array.from(pairBlock.children).indexOf(seat) === columnIndex
      ) {
        behindSeat = seat;
      }
    });

    if (behindSeat && availableSeats.includes(behindSeat)) {
      behindSeat.innerHTML =
        "<small>" + behindSeat.dataset.number + "</small><br>" + s23;
      behindSeat.classList.add("filled");

      availableSeats = availableSeats.filter(s => s !== behindSeat);
    }
  }

  // Fill rest randomly
  shuffle(pool);

  pool.forEach((name, i) => {
    if (availableSeats[i]) {
      availableSeats[i].innerHTML =
        "<small>" + availableSeats[i].dataset.number + "</small><br>" + name;
      availableSeats[i].classList.add("filled");
    }
  });
}
</script>

</body>
</html>
