<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>s3sf</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f4f6f8;
  display: flex;
  flex-direction: column;
  align-items: center;
}

textarea {
  width: 320px;
  height: 120px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
  resize: none;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #2ecc71;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #27ae60;
}

.classroom {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.row {
  display: flex;
  gap: 14px;
  justify-content: center;
}

.block {
  display: grid;
  gap: 6px;
}

.block-2 { grid-template-columns: repeat(2, 50px); }
.block-3 { grid-template-columns: repeat(3, 50px); }
.block-4 { grid-template-columns: repeat(4, 50px); }

.seat {
  width: 50px;
  height: 50px;
  background: #dfe6e9;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  text-align: center;
  padding: 3px;
  transition: 0.2s;
}

.filled {
  background: #e74c3c;
  color: white;
}
</style>
</head>

<body>

<h1>macee attackkk!</h1>

<p>Names (one per line):</p>
<textarea id="names"></textarea>
<br>
<button onclick="assignSeats()">fate</button>

<div class="classroom" id="classroom"></div>

<script>
const classroomDiv = document.getElementById("classroom");
let seatElements = [];

// Layout definition
const layouts = [
  [2,3,3,2],
  [2,3,3,2],
  [2,3,3,2],
  [2,4,2]
];

// Build classroom
layouts.forEach(rowLayout => {
  const row = document.createElement("div");
  row.className = "row";

  rowLayout.forEach(size => {
    const block = document.createElement("div");
    block.className = "block block-" + size;

    for (let i = 0; i < size; i++) {
      const seat = document.createElement("div");
      seat.className = "seat";
      block.appendChild(seat);
      seatElements.push(seat);
    }

    row.appendChild(block);
  });

  classroomDiv.appendChild(row);
});

// Fisher-Yates shuffle
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// Fair random assignment
function assignSeats() {
  const input = document.getElementById("names").value.trim();
  if (!input) {
    alert("Enter student names first.");
    return;
  }

  let names = input.split("\n").map(n => n.trim()).filter(n => n);

  if (names.length > seatElements.length) {
    alert("Too many students! Max seats: " + seatElements.length);
    return;
  }

  // Clear seats
  seatElements.forEach(seat => {
    seat.textContent = "";
    seat.classList.remove("filled");
  });

  shuffle(names);
  let shuffledSeats = shuffle([...seatElements]);

  names.forEach((name, index) => {
    shuffledSeats[index].textContent = name;
    shuffledSeats[index].classList.add("filled");
  });
}
</script>

</body>
</html>
