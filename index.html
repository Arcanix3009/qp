<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>s3sf</title>
<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

textarea {
  width: 320px;
  height: 120px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: #2ecc71;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.classroom {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.row {
  display: flex;
  gap: 14px;
  justify-content: center;
}

.block {
  display: grid;
  gap: 6px;
}

.block-2 { grid-template-columns: repeat(2, 50px); }
.block-3 { grid-template-columns: repeat(3, 50px); }
.block-4 { grid-template-columns: repeat(4, 50px); }

.seat {
  width: 50px;
  height: 50px;
  background: #dfe6e9;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 9px;
}

.seat small {
  font-size: 8px;
  opacity: 0.6;
}

.filled {
  background: #e74c3c;
  color: white;
}
</style>
</head>

<body>

<h1>macee attackkk!</h1>

<textarea id="names" placeholder="One name per line"></textarea>
<br>
<button onclick="assignSeats()">fate</button>

<div class="classroom" id="classroom"></div>

<script>
const classroomDiv = document.getElementById("classroom");
let seatElements = [];
let seatMap = [];
let counter = 1;

const layouts = [
  [2,3,3,2],
  [2,3,3,2],
  [2,3,3,2],
  [2,3,3,2],
  [2,4,2]
];

// Build classroom
layouts.forEach((rowLayout, rowIndex) => {
  const row = document.createElement("div");
  row.className = "row";

  rowLayout.forEach(size => {
    const block = document.createElement("div");
    block.className = "block block-" + size;

    for (let i = 0; i < size; i++) {
      const seat = document.createElement("div");
      seat.className = "seat";
      seat.dataset.number = counter;
      seat.innerHTML = "<small>" + counter + "</small>";
      counter++;

      block.appendChild(seat);
      seatElements.push(seat);
      seatMap.push({ row: rowIndex, block: block });
    }

    row.appendChild(block);
  });

  classroomDiv.appendChild(row);
});

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function assignSeats() {

  let names = document.getElementById("names")
    .value
    .trim()
    .split("\n")
    .map(n => n.trim())
    .filter(n => n);

  if (names.length > seatElements.length) {
    alert("Too many students!");
    return;
  }

  // Reset seats
  seatElements.forEach(seat => {
    seat.innerHTML = "<small>" + seat.dataset.number + "</small>";
    seat.classList.remove("filled");
  });

  let pool = [...names];

  // Extract FIRST
  let s41 = names[40];
  let s20 = names[19];
  let s23 = names[22];

  // Remove safely (descending order)
  [40,22,19].sort((a,b)=>b-a).forEach(i=>{
    if (i < pool.length) pool.splice(i,1);
  });

  let available = [...seatElements];
  shuffle(available);

  let pairSeat1 = null;
  let pairSeat2 = null;

  // Place pair
  if (s41 && s20) {
    for (let seat of available) {
      const siblings = Array.from(seat.parentElement.children);
      const idx = siblings.indexOf(seat);

      if (idx < siblings.length - 1 &&
          available.includes(siblings[idx+1])) {
        pairSeat1 = seat;
        pairSeat2 = siblings[idx+1];
        break;
      }
    }

    if (pairSeat1) {
      pairSeat1.innerHTML = `<small>${pairSeat1.dataset.number}</small><br>${s41}`;
      pairSeat2.innerHTML = `<small>${pairSeat2.dataset.number}</small><br>${s20}`;
      pairSeat1.classList.add("filled");
      pairSeat2.classList.add("filled");

      available = available.filter(s => s !== pairSeat1 && s !== pairSeat2);
    }
  }

  // Place #23 behind #41
  if (s23 && pairSeat1) {
    const index = seatElements.indexOf(pairSeat1);
    const row = seatMap[index].row;
    const block = seatMap[index].block;
    const col = Array.from(block.children).indexOf(pairSeat1);

    let behindSeat = null;

    seatElements.forEach((seat,i)=>{
      if (seatMap[i].row === row+1 &&
          seatMap[i].block === block &&
          Array.from(block.children).indexOf(seat) === col) {
        behindSeat = seat;
      }
    });

    if (behindSeat && available.includes(behindSeat)) {
      behindSeat.innerHTML = `<small>${behindSeat.dataset.number}</small><br>${s23}`;
      behindSeat.classList.add("filled");
      available = available.filter(s => s !== behindSeat);
    }
  }

  // Fill rest
  shuffle(pool);
  pool.forEach((name,i)=>{
    if (available[i]) {
      available[i].innerHTML =
        `<small>${available[i].dataset.number}</small><br>${name}`;
      available[i].classList.add("filled");
    }
  });

}
</script>

</body>
</html>
