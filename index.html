<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>s3sf</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f4f6f8;
  display: flex;
  flex-direction: column;
  align-items: center;
}

textarea {
  width: 320px;
  height: 120px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
  resize: none;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #2ecc71;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #27ae60;
}

.classroom {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.row {
  display: flex;
  gap: 14px;
  justify-content: center;
}

.block {
  display: grid;
  gap: 6px;
}

.block-2 { grid-template-columns: repeat(2, 50px); }
.block-3 { grid-template-columns: repeat(3, 50px); }
.block-4 { grid-template-columns: repeat(4, 50px); }

.seat {
  width: 50px;
  height: 50px;
  background: #dfe6e9;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  text-align: center;
  padding: 3px;
}

.seat small {
  font-size: 8px;
  opacity: 0.6;
}

.filled {
  background: #e74c3c;
  color: white;
}
</style>
</head>

<body>

<h1>macee attackkk!</h1>

<p>Names (one per line):</p>
<textarea id="names"></textarea>
<br>
<button onclick="assignSeats()">fate</button>

<div class="classroom" id="classroom"></div>

<script>
const classroomDiv = document.getElementById("classroom");
let seatElements = [];
let seatMap = [];
let seatCounter = 1;

const layouts = [
  [2,3,3,2],
  [2,3,3,2],
  [2,3,3,2],
  [2,3,3,2],
  [2,4,2]
];

// Build classroom
layouts.forEach((rowLayout, rowIndex) => {
  const row = document.createElement("div");
  row.className = "row";

  rowLayout.forEach(size => {
    const block = document.createElement("div");
    block.className = "block block-" + size;

    for (let i = 0; i < size; i++) {
      const seat = document.createElement("div");
      seat.className = "seat";
      seat.dataset.number = seatCounter;
      seat.innerHTML = "<small>" + seatCounter + "</small>";
      seatCounter++;

      block.appendChild(seat);
      seatElements.push(seat);
      seatMap.push({row: rowIndex, blockSize: size});
    }

    row.appendChild(block);
  });

  classroomDiv.appendChild(row);
});

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function assignSeats() {
  const input = document.getElementById("names").value.trim();
  if (!input) {
    alert("Enter student names first.");
    return;
  }

  let names = input.split("\n").map(n => n.trim()).filter(n => n);

  if (names.length > seatElements.length) {
    alert("Too many students!");
    return;
  }

  // Clear seats but keep numbers
  seatElements.forEach(seat => {
    seat.innerHTML = "<small>" + seat.dataset.number + "</small>";
    seat.classList.remove("filled");
  });

  // Special students (based on list position)
  const s2  = names[1];
  const s13 = names[12];
  const s20 = names[19];
  const s23 = names[22];
  const s41 = names[40];

  // Remove them from pool (highest index first)
  [41,22,19,12,1].sort((a,b)=>b-a).forEach(i=>{
    if(names[i]) names.splice(i,1);
  });

  let availableSeats = [...seatElements];

  // 1️⃣ Seat 2 in 4-seat block (last row middle)
  const fourBlockSeats = seatElements.filter((seat, i) =>
    seatMap[i].row === 4 && seatMap[i].blockSize === 4
  );

  shuffle(fourBlockSeats);
  let seat2Spot = fourBlockSeats[0];

  seat2Spot.innerHTML = "<small>" + seat2Spot.dataset.number + "</small><br>" + s2;
  seat2Spot.classList.add("filled");
  availableSeats = availableSeats.filter(s => s !== seat2Spot);

  // 2️⃣ Pair 42 and 20 side by side
  shuffle(availableSeats);

  let pairSpot1 = null;
  let pairSpot2 = null;

  for (let i = 0; i < availableSeats.length; i++) {
    const parent = availableSeats[i].parentElement;
    const siblings = Array.from(parent.children);
    const idx = siblings.indexOf(availableSeats[i]);

    if (idx < siblings.length - 1 && availableSeats.includes(siblings[idx+1])) {
      pairSpot1 = availableSeats[i];
      pairSpot2 = siblings[idx+1];
      break;
    }
  }

  pairSpot1.innerHTML = "<small>" + pairSpot1.dataset.number + "</small><br>" + s41;
  pairSpot2.innerHTML = "<small>" + pairSpot2.dataset.number + "</small><br>" + s20;
  pairSpot1.classList.add("filled");
  pairSpot2.classList.add("filled");

  availableSeats = availableSeats.filter(s => s !== pairSpot1 && s !== pairSpot2);

  // 3️⃣ Seat 23 behind them
  const pairIndexGlobal = seatElements.indexOf(pairSpot1);
  const pairRow = seatMap[pairIndexGlobal].row;
  const pairBlock = pairSpot1.parentElement;
  const pairIndex = Array.from(pairBlock.children).indexOf(pairSpot1);

  let behindSeat = null;

  seatElements.forEach((seat, i) => {
    if (
      seatMap[i].row === pairRow + 1 &&
      seat.parentElement === pairBlock &&
      Array.from(pairBlock.children).indexOf(seat) === pairIndex
    ) {
      behindSeat = seat;
    }
  });

  if (behindSeat && availableSeats.includes(behindSeat)) {
    behindSeat.innerHTML = "<small>" + behindSeat.dataset.number + "</small><br>" + s23;
    behindSeat.classList.add("filled");
    availableSeats = availableSeats.filter(s => s !== behindSeat);
  }

  // 4️⃣ Prevent seat 13 next to seat 2
  const seat2Parent = seat2Spot.parentElement;
  const siblings = Array.from(seat2Parent.children);
  const seat2Index = siblings.indexOf(seat2Spot);

  let forbiddenSeats = [];
  if (seat2Index > 0) forbiddenSeats.push(siblings[seat2Index - 1]);
  if (seat2Index < siblings.length - 1) forbiddenSeats.push(siblings[seat2Index + 1]);

  availableSeats = availableSeats.filter(s => !forbiddenSeats.includes(s));

  let seat13Spot = shuffle(availableSeats)[0];

  seat13Spot.innerHTML = "<small>" + seat13Spot.dataset.number + "</small><br>" + s13;
  seat13Spot.classList.add("filled");
  availableSeats = availableSeats.filter(s => s !== seat13Spot);

  // 5️⃣ Fill remaining randomly
  shuffle(names);
  names.forEach((name, i) => {
    if (availableSeats[i]) {
      availableSeats[i].innerHTML =
        "<small>" + availableSeats[i].dataset.number + "</small><br>" + name;
      availableSeats[i].classList.add("filled");
    }
  });
}
</script>

</body>
</html>
